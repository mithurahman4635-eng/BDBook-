<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Mithu Cloud Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="main-card">
        <h1>MITHU CLOUD</h1>
        <p style="color: #666; font-size: 12px;">Next Level Hosting Engine</p>
        <input type="text" id="username" placeholder="ইউজার আইডি">
        <input type="text" id="repo" placeholder="গিটহাব রিপোজিটরি লিঙ্ক (https://...)">
        <button onclick="deployApp()" id="btn">Deploy Now</button>
    </div>

    <div class="project-list" id="projectList"></div>

    <script>
        // ১. প্রজেক্ট লিস্ট লোড করা
        async function loadProjects() {
            try {
                const res = await fetch('/list-projects');
                const projects = await res.json();
                const listDiv = document.getElementById('projectList');
                let header = '<h3 style="margin-bottom:15px; font-size:14px; color:#5865f2; margin-left:10px;">⦿ LIVE NODES</h3>';
                
                listDiv.innerHTML = header + projects.map(p => `
                    <div class="project-item" id="item-${p.name}">
                        <div style="display: flex; align-items: center; flex-grow: 1;">
                            <div style="text-align: left; min-width: 140px; flex-shrink: 0;">
                                <div style="font-weight: bold; font-size: 14px;">
                                    <span class="status-dot" id="dot-${p.name}"></span> ${p.name.toUpperCase()}
                                </div>
                                <div style="font-size: 10px; color: #888; margin-top: 4px;">
                                    By ${p.user} • ${p.time}
                                </div>
                            </div><div style="margin-top: 8px;">
    ${p.url ? `
        <a href="${p.url}" target="_blank" 
           style="color: #00d2ff; text-decoration: none; font-size: 11px; border: 1px solid rgba(0, 210, 255, 0.3); padding: 4px 8px; border-radius: 4px; background: rgba(0, 210, 255, 0.1); display: inline-block;">
           🔗 Open Link
        </a>
    ` : `
        <span style="color: #666; font-size: 11px; font-style: italic;">⌛ Generating Link...</span>
    `}
</div>
                            <div class="status-container" style="flex-grow:1; display:flex; justify-content:center; align-items:center; height:40px;">
                                <div id="pulse-${p.name}" style="width:100%;">
                                    <svg viewBox="0 0 300 40" preserveAspectRatio="none" style="width:100%; height:40px;">
                                        <path class="heartbeat-line" style="fill:none; stroke:#00d2ff; stroke-width:6;" d="M0,20 L100,20 L110,5 L130,35 L140,20 L300,20" />
                                    </svg>
                                </div>
                                <div class="warn-icon" id="warn-${p.name}">⚠ WARNING</div>
                            </div>
                        </div>
                        <button id="btn-${p.name}" class="delete-btn" onclick="handleToggle('${p.name}')">TERMINATE</button>
                    </div>
                `).join('');
            } catch (err) { console.log("Failed to load"); }
        }

        // ২. অন/অফ করার মেইন হ্যান্ডলার
        async function handleToggle(name) {
            const pulse = document.getElementById(`pulse-${name}`);
            const btn = document.getElementById(`btn-${name}`);

            if (pulse.style.display !== 'none') {
                // বন্ধ করা (ছবি ১৮৫৩৮ এর মতো)
                if(!confirm(`${name} বন্ধ করতে চান?`)) return;
                updateStatusUI(name, 'OFF');
                await fetch('/stop-project', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) });
            } else {
                // আবার চালু করা (রিস্টার্ট)
                if(!confirm(`${name} আবার চালু করতে চান?`)) return;
                btn.innerText = "STARTING..."; btn.disabled = true;
                try {
                    const res = await fetch('/start-project', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) });
                    if(res.ok) updateStatusUI(name, 'ON');
                    else alert("রিস্টার্ট এরর!");
                } catch (err) { updateStatusUI(name, 'OFF'); }
            }
        }

        // ৩. UI আপডেট (৩টি কাজ একসাথে)
        function updateStatusUI(name, status) {
            const pulse = document.getElementById(`pulse-${name}`);
            const warn = document.getElementById(`warn-${name}`);
            const item = document.getElementById(`item-${name}`);
            const dot = document.getElementById(`dot-${name}`);
            const btn = document.getElementById(`btn-${name}`);

            if (status === 'OFF') {
                pulse.style.display = 'none';
                warn.style.display = 'block';
                item.style.borderColor = '#ff3e3e';
                dot.style.display = 'none';
                btn.innerText = "RE-START";
                btn.classList.add('restart-btn');
            } else {
                pulse.style.display = 'block';
                warn.style.display = 'none';
                item.style.borderColor = 'rgba(0, 210, 255, 0.2)';
                dot.style.display = 'inline-block';
                btn.innerText = "TERMINATE";
                btn.classList.remove('restart-btn');
            }
            btn.disabled = false;
        }

        // ৪. নতুন ডেপ্লয় (ক্লোন এরর হ্যান্ডেলিং সহ)
        async function deployApp() {
            const username = document.getElementById('username').value;
            const repo = document.getElementById('repo').value;
            const btn = document.getElementById('btn');
            
            if(!username || !repo) return alert("তথ্য পূরণ করুন!");
            
            btn.innerText = "Deploying..."; btn.disabled = true;
            try {
                const res = await fetch('/deploy', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ username, repo }) 
                });
                const data = await res.json();
                if (data.status === "Success") {
                    alert("সফলভাবে ডেপ্লয় হয়েছে!");
                    loadProjects();
                } else {
                    alert("❌ এরর: " + (data.error || "Clone Failed!"));
                }
            } catch (err) {
                alert("সার্ভার কানেকশন এরর!");
            } finally {
                btn.innerText = "Deploy Now";
                btn.disabled = false;
            }
        }

        loadProjects();

        // ক্যানভাস এনিমেশন আগের মতোই থাকবে...
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Dot {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fillStyle = '#00d2ff'; ctx.fill(); }
        }
        for (let i = 0; i < 60; i++) dots.push(new Dot());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach((dot, i) => {
                dot.update(); dot.draw();
                for (let j = i + 1; j < dots.length; j++) {
                    const dist = Math.hypot(dot.x - dots[j].x, dot.y - dots[j].y);
                    if (dist < 150) {
                        ctx.beginPath(); ctx.strokeStyle = `rgba(0, 210, 255, ${1 - dist / 150})`;
                        ctx.lineWidth = 0.5; ctx.moveTo(dot.x, dot.y); ctx.lineTo(dots[j].x, dots[j].y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
