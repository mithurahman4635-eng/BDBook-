<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - BDBook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="post.css">
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <h3>Create Post</h3>
    </div>

    <div class="post-container">
        <div class="user-section">
            <img src="https://via.placeholder.com/100" id="profile-img">
            <div class="user-meta">
                <h4>Mithu Rahman <span id="dynamic-tags" class="tags-inline"></span></h4>
                <div class="privacy-pill" onclick="openModal('privacy-modal')">
                    <i class="fas fa-globe-americas" id="privacy-icon"></i> 
                    <span id="privacy-text">Public</span> 
                    <i class="fas fa-caret-down"></i>
                </div>
            </div>
        </div>

        <div id="location-tag" style="display:none;">📍 <span id="loc-name"></span></div>

        <div class="input-box" id="bg-target">
            <div id="post-editor" contenteditable="true" placeholder="আপনার মনে কি আছে লিখুন..." oninput="handleInput()"></div>
        </div>

        <div id="custom-color-box" class="color-palette-container" style="display:none;">
            <div class="color-dot" style="background: #ffffff; border: 1px solid #ddd;" onclick="setManualColor('#ffffff')"></div>
            <div class="color-dot" style="background: #000000;" onclick="setManualColor('#000000')"></div> <div class="color-dot" style="background: #ff0000;" onclick="setManualColor('#ff0000')"></div>
            <div class="color-dot" style="background: #00ff00;" onclick="setManualColor('#00ff00')"></div>
            <div class="color-dot" style="background: #0000ff;" onclick="setManualColor('#0000ff')"></div>
            <div class="color-dot" style="background: #ffff00;" onclick="setManualColor('#ffff00')"></div>
            <div class="color-dot" style="background: #ff00ff;" onclick="setManualColor('#ff00ff')"></div>
            <div class="color-dot" style="background: #00ffff;" onclick="setManualColor('#00ffff')"></div>
        </div>

        <div id="media-preview-container"></div>
    </div>

    <div class="bottom-tools">
        <div class="add-box">
            <span style="font-size: 14px; font-weight: bold;">Add to post</span>
            <div class="tool-icons">
                <input type="file" id="media-input" accept="image/*,video/*" style="display:none;" onchange="previewMedia(event)">
                
                <i class="fas fa-images" style="color: #45bd62;" onclick="document.getElementById('media-input').click()"></i>
                
                <label for="text-color-input">
                    <i class="fas fa-eye-dropper" style="color: #ffc107; cursor: pointer;"></i>
                </label>
                <input type="color" id="text-color-input" style="display:none;" onchange="changeTextColor(this.value)">

                <i class="fas fa-font" style="color: #e91e63;" onclick="openModal('font-modal')"></i> 
                <i class="fas fa-fill-drip" style="color: #ff5722;" onclick="toggleColorBox()"></i> 
                <i class="fas fa-palette" style="color: #9c27b0;" onclick="applyMagicBg()"></i> 
                
                <i class="fas fa-user-tag" style="color: #1877f2;" onclick="openModal('friend-modal')"></i>
                
                <i class="fas fa-smile" style="color: #f7b928;" onclick="openModal('feeling-modal')"></i>
                <i class="fas fa-map-marker-alt" style="color: #f5533d;" onclick="detectLocation()"></i>
            </div>
        </div>
<div style="padding: 10px; margin-top: 10px;">
    <button id="post-btn" class="post-submit-btn" 
            style="width: 100%; background: #1877f2; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: block !important;" 
            onclick="publishPost()">
        Post
    </button>
</div>
    <div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModal()">
        <div class="modal-body" id="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <script src="post.js"></script>
</body>
</html>
